name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  release:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build mpack
        run: bash build_mpack.sh

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ODPSC Mpack ${{ github.ref_name }}
          body: |
            ## ODP Support Collector - Management Pack ${{ github.ref_name }}

            ### Installation

            ```bash
            ambari-server install-mpack --mpack=odpsc-mpack-2.0.tar.gz --verbose
            ambari-server restart
            ```

            ### What's included
            - ODPSC Master component (Flask/Gunicorn)
            - ODPSC Agent component (distributed collectors)
            - Ambari service configuration (odpsc-site.xml)
            - Log analyzer with Hadoop pattern detection
            - Audit trail system
            - SupportPlane integration
          files: build/odpsc-mpack-*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
