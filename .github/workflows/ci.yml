name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Check Python syntax
        run: |
          python -m py_compile odpsc-mpack/services/ODPSC/resources/odpsc_master.py
          python -m py_compile odpsc-mpack/services/ODPSC/resources/odpsc_agent.py
          python -m py_compile odpsc-mpack/services/ODPSC/resources/analyzer.py
          python -m py_compile odpsc-mpack/services/ODPSC/resources/audit.py
          python -m py_compile odpsc-mpack/services/ODPSC/resources/collectors.py
          python -m py_compile odpsc-mpack/services/ODPSC/resources/wsgi.py
          python -m py_compile odpsc-mpack/services/ODPSC/scripts/master.py
          python -m py_compile odpsc-mpack/services/ODPSC/scripts/agent.py

      - name: Run tests
        run: python -m pytest tests/ -v --cov=odpsc-mpack/services/ODPSC/resources --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build mpack
        run: bash build_mpack.sh

      - name: Upload mpack artifact
        uses: actions/upload-artifact@v4
        with:
          name: odpsc-mpack
          path: build/odpsc-mpack-*.tar.gz
          retention-days: 30
